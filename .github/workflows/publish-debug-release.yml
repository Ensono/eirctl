name: Publish debug prerelease

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: Successful Debug build workflow run ID
        required: true
        type: string
      pull_request:
        description: Pull request number recorded by the debug build
        required: true
        type: string
      commit_sha:
        description: Immutable pull-request head SHA recorded by the debug build
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.validate.outputs.artifact_id }}
      artifact_name: ${{ steps.validate.outputs.artifact_name }}
      workflow_run_attempt: ${{ steps.validate.outputs.workflow_run_attempt }}
      tag_name: ${{ steps.validate.outputs.tag_name }}
    steps:
      - name: Validate selected debug build identity and PR revision
        id: validate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          PULL_REQUEST: ${{ inputs.pull_request }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        with:
          script: |
            const runId = Number(process.env.BUILD_RUN_ID);
            const pullRequest = Number(process.env.PULL_REQUEST);
            const commitSHA = process.env.COMMIT_SHA;
            const repository = context.repo.owner + '/' + context.repo.repo;
            if (!Number.isSafeInteger(runId) || !Number.isSafeInteger(pullRequest) || !/^[0-9a-f]{40}$/i.test(commitSHA)) {
              core.setFailed('A workflow run ID, pull request number, and full 40-character commit SHA are required.');
              return;
            }

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            if (run.name !== 'Debug build' || run.path !== '.github/workflows/debug-build.yml' || run.event !== 'workflow_dispatch' || run.conclusion !== 'success' || run.repository?.full_name !== repository) {
              core.setFailed('The selected run is not a successful dispatched Debug build in this repository.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest,
            });
            if (pr.base.repo.full_name !== repository || pr.head.sha.toLowerCase() !== commitSHA.toLowerCase()) {
              core.setFailed('The selected pull request does not resolve to the requested immutable commit SHA.');
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const artifactName = `debug-build-${runId}`;
            const artifact = artifacts.artifacts.find(candidate => candidate.name === artifactName && !candidate.expired);
            if (!artifact) {
              core.setFailed('The selected debug build has no available provenance artifact.');
              return;
            }
            core.setOutput('artifact_id', String(artifact.id));
            core.setOutput('artifact_name', artifactName);
            core.setOutput('workflow_run_attempt', String(run.run_attempt));
            core.setOutput('tag_name', `debug-pr-${pullRequest}-${commitSHA.slice(0, 12).toLowerCase()}`);

      - name: Download selected artifact for read-only provenance validation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.validate.outputs.artifact_id }}
          path: validated-artifact
          merge-multiple: true
          run-id: ${{ inputs.build_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Verify provenance before privileged publication
        env:
          PULL_REQUEST: ${{ inputs.pull_request }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ steps.validate.outputs.workflow_run_attempt }}
          WORKFLOW_EVENT: workflow_dispatch
        run: |
          test -f validated-artifact/debug-build-provenance.json
          jq --exit-status \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pull_request "$PULL_REQUEST" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg workflow_run_id "$BUILD_RUN_ID" \
            --arg workflow_run_attempt "$WORKFLOW_RUN_ATTEMPT" \
            --arg event "$WORKFLOW_EVENT" \
            '.repository == $repository and .event == $event and .pull_request == $pull_request and (.commit_sha | ascii_downcase) == ($commit_sha | ascii_downcase) and .workflow_run_id == $workflow_run_id and .workflow_run_attempt == $workflow_run_attempt' \
            validated-artifact/debug-build-provenance.json >/dev/null

  publish:
    if: github.ref == 'refs/heads/main'
    needs: validate-build
    runs-on: ubuntu-24.04
    environment: debug-release
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download validated build artifact as opaque data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.validate-build.outputs.artifact_id }}
          path: release-assets
          merge-multiple: true
          run-id: ${{ inputs.build_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Verify downloaded provenance
        env:
          PULL_REQUEST: ${{ inputs.pull_request }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ needs.validate-build.outputs.workflow_run_attempt }}
          WORKFLOW_EVENT: workflow_dispatch
        run: |
          test -f release-assets/debug-build-provenance.json
          jq --exit-status \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pull_request "$PULL_REQUEST" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg workflow_run_id "$BUILD_RUN_ID" \
            --arg workflow_run_attempt "$WORKFLOW_RUN_ATTEMPT" \
            --arg event "$WORKFLOW_EVENT" \
            '.repository == $repository and .event == $event and .pull_request == $pull_request and (.commit_sha | ascii_downcase) == ($commit_sha | ascii_downcase) and .workflow_run_id == $workflow_run_id and .workflow_run_attempt == $workflow_run_attempt' \
            release-assets/debug-build-provenance.json >/dev

      - name: Publish prerelease assets without executing them
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.validate-build.outputs.tag_name }}
          name: Debug build for PR #${{ inputs.pull_request }} (${{ inputs.commit_sha }})
          prerelease: true
          generate_release_notes: false
          files: release-assets/bin/*
