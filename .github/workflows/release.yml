name: Release

on:
  workflow_run:
    workflows: ["Lint and Test"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  set-version-tag:
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-26.04
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # get version
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8
        with:
          versionSpec: "5.x"
      - name: Set SemVer Version
        uses: gittools/actions/gitversion/execute@@bc6623af8fc07d5a8903052dd46da33403eec8e8
        id: gitversion

  release:
    runs-on: ubuntu-26.04
    needs: set-version-tag
    env:
      SEMVER: ${{ needs.set-version-tag.outputs.semVer }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.25.x

      - name: set up git for tag pushing
        run: |
          apt-get update && apt-get install -y git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.email ${{ github.actor }}-ci@gha.org
          git config user.name ${{ github.actor }}

      - name: build binaries
        run: |
          echo "Version: v$SEMVER"
          echo "Revision: $GITHUB_SHA"
          go run cmd/main.go run pipeline build:binary --set Version=v${SEMVER} --set Revision=$GITHUB_SHA

      # tag repo
      - name: tag repo
        run: |
          echo "REVISION  -> $GITHUB_SHA"
          echo "VERSION -> $GITVERSION_SEMVER"
          git tag -a "v${SEMVER}" -m "ci tag release" $GITHUB_SHA
          git push origin "v${SEMVER}"

      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ needs.set-version-tag.outputs.semVer }}
          # TODO: add additional info to the release
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./bin/*
          prerelease: false
