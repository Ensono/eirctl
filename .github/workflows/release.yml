name: Release

on:
  workflow_run:
    workflows: ["Lint and Test"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  set-version-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - name: Check out protected main with history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Verify the validated workflow-run revision
        env:
          VALIDATED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$VALIDATED_HEAD_SHA"
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        with:
          versionSpec: '6.2.0'
      - name: Set SemVer Version
        uses: gittools/actions/gitversion/execute@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        id: gitversion
        with:
          configFilePath: GitVersion.yml
      - name: Validate stable production SemVer
        env:
          SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: scripts/check-release-versioning.sh

  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    environment: prod
    needs: set-version-tag
    env:
      SEMVER: ${{ needs.set-version-tag.outputs.semVer }}
    steps:
      - name: Check out protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Verify the validated workflow-run revision
        env:
          VALIDATED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$VALIDATED_HEAD_SHA"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5

      - name: build binaries
        run: |
          echo "Version: v$SEMVER"
          echo "Revision: ${{ github.event.workflow_run.head_sha }}"
          go run cmd/main.go run pipeline build:binary --set Version=v${SEMVER} --set Revision=${{ github.event.workflow_run.head_sha }}

      - name: Create annotated release tag with step-scoped credentials
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          tag_sha="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/git/tags" \
            -f tag="v${SEMVER}" \
            -f message='ci tag release' \
            -f object="$VALIDATED_HEAD_SHA" \
            -f type=commit \
            --jq .sha)"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/v${SEMVER}" \
            -f sha="$tag_sha"

      - name: Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ needs.set-version-tag.outputs.semVer }}
          # TODO: add additional info to the release
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./bin/*
          prerelease: false
