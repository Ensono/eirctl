name: Publish Container

on:
  workflow_run:
    workflows: ["Lint and Test"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  set-version-tag:
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-26.04
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # get version
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8
        with:
          versionSpec: "5.x"
      - name: Set SemVer Version
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8
        id: gitversion

  build-and-push:
    runs-on: ubuntu-latest
    needs: set-version-tag
    env:
      SEMVER: ${{ needs.set-version-tag.outputs.semVer }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          # GITHUB_TOKEN is automatically provided in GitHub Actions
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds, optional)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push Docker image - alpine
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          build-args: Version=${{ needs.set-version-tag.outputs.semVer }},Revision=${{ github.sha }}
          tags: |
            ghcr.io/ensono/eirctl:${{ needs.set-version-tag.outputs.semVer }}
          platforms: linux/amd64,linux/x86_64,linux/arm64

      - name: Build and push Docker image - pwsh
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          file: Dockerfile.pwsh
          build-args: Version=${{ needs.set-version-tag.outputs.semVer }},Revision=${{ github.sha }}
          tags: |
            ghcr.io/ensono/eirctl:pwsh-${{ needs.set-version-tag.outputs.semVer }}
          platforms: linux/amd64,linux/x86_64,linux/arm64
