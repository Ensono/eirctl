name: Publish Container

on:
  workflow_run:
    workflows: ["Lint and Test"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  set-version-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - name: Check out protected main with history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Verify the validated workflow-run revision
        env:
          VALIDATED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$VALIDATED_HEAD_SHA"
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        with:
          versionSpec: "6.2.0"
      - name: Set SemVer Version
        uses: gittools/actions/gitversion/execute@7417b1089e2c7de93510f1901d656ddf60bb024f # v4.7.0
        id: gitversion
        with:
          configFilePath: GitVersion.yml
      - name: Validate stable production SemVer
        env:
          SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: scripts/check-release-versioning.sh

  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    environment: prod
    needs: set-version-tag
    env:
      SEMVER: ${{ needs.set-version-tag.outputs.semVer }}
    steps:
      - name: Check out protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Verify the validated workflow-run revision
        env:
          VALIDATED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$VALIDATED_HEAD_SHA"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          # GITHUB_TOKEN is automatically provided in GitHub Actions
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds, optional)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push Docker image - alpine
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          build-args: Version=${{ needs.set-version-tag.outputs.semVer }},Revision=${{ github.event.workflow_run.head_sha }}
          tags: |
            ghcr.io/ensono/eirctl:${{ needs.set-version-tag.outputs.semVer }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push Docker image - pwsh
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          file: Dockerfile.pwsh
          build-args: Version=${{ needs.set-version-tag.outputs.semVer }},Revision=${{ github.event.workflow_run.head_sha }}
          tags: |
            ghcr.io/ensono/eirctl:pwsh-${{ needs.set-version-tag.outputs.semVer }}
          platforms: linux/amd64,linux/arm64
