name: Debug build

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/build-debug')
    runs-on: ubuntu-24.04
    outputs:
      pull_request: ${{ steps.pull-request.outputs.number }}
      head_sha: ${{ steps.pull-request.outputs.sha }}
      semver: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - name: Resolve immutable pull-request revision
        id: pull-request
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('number', String(pr.data.number));
            core.setOutput('sha', pr.data.head.sha);
            return pr.data.head.sha;

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.pull-request.outputs.sha }}
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@2ef88d1c60c94a47f22e4add7032a9bc597fb07e # v3.0
        with:
          versionSpec: '5.x'
      - name: Set SemVer version
        id: gitversion
        uses: gittools/actions/gitversion/execute@2ef88d1c60c94a47f22e4add7032a9bc597fb07e # v3.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 1.26.5

      - name: Build debug binaries
        env:
          SEMVER: ${{ steps.gitversion.outputs.semVer }}
          HEAD_SHA: ${{ steps.pull-request.outputs.sha }}
        run: |
          go run cmd/main.go run pipeline build:binary \
            --set Version="v${SEMVER}" \
            --set Revision="${HEAD_SHA}"

      - name: Record build provenance
        env:
          PULL_REQUEST: ${{ steps.pull-request.outputs.number }}
          HEAD_SHA: ${{ steps.pull-request.outputs.sha }}
          SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: |
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pull_request "$PULL_REQUEST" \
            --arg commit_sha "$HEAD_SHA" \
            --arg workflow_run_id "$GITHUB_RUN_ID" \
            --arg workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg semver "$SEMVER" \
            '{repository: $repository, pull_request: $pull_request, commit_sha: $commit_sha, workflow_run_id: $workflow_run_id, workflow_run_attempt: $workflow_run_attempt, semver: $semver}' \
            > debug-build-provenance.json

      - name: Upload debug build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debug-build-${{ github.run_id }}
          path: |
            bin/
            debug-build-provenance.json
          if-no-files-found: error
          retention-days: 14
