name: Trusted workflow policy

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  policy:
    name: Trusted workflow policy
    runs-on: ubuntu-24.04
    steps:
      # pull_request_target must execute only protected base-branch code.
      - name: Check out protected base revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Materialize candidate policy data without execution
        id: candidate
        env:
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: |
          tmp_root="$(mktemp -d)"
          candidate_root="$tmp_root/candidate"
          trap 'rm -rf "$tmp_root"' EXIT
          scripts/materialize-policy-candidate \
            --pull-request "$PULL_REQUEST" \
            --output "$candidate_root"
          go run ./scripts/check-workflow-policy --candidate-root "$candidate_root"
