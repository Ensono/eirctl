name: Lint and Test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  set-version-tag:
    runs-on: ubuntu-24.04
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@2ef88d1c60c94a47f22e4add7032a9bc597fb07e # v3.0
        with:
          versionSpec: "5.x"
      - name: Set SemVer Version
        uses: gittools/actions/gitversion/execute@2ef88d1c60c94a47f22e4add7032a9bc597fb07e # v3.0
        id: gitversion

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 1.26.5
      - name: Check maintained Go versions
        run: scripts/check-go-version.sh
      - name: Check workflow security policy
        run: scripts/check-workflow-security.sh
      - name: Linters
        run: |
          go run -race cmd/main.go run lints

  test:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            docker_host: unix:///var/run/docker.sock
          # TODO: Fix Windows Test Pipeline, this will require our own
          # self-hosted agent...
          # - name: Windows
          #   os: windows-2025
          #   # docker_host: /var/run/docker.sock
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs:
      - set-version-tag
      - lint
    env:
      SEMVER: ${{ needs.set-version-tag.outputs.semVer }}
      DOCKER_HOST: ${{ matrix.docker_host }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 1.26.5

      - name: Check out code into the Go module directory
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Check Schema
        # TODO: Schema Generation is broken on Windows atm
        if: matrix.name == 'Linux'
        run: |
          go run cmd/main.go generate_own_schema
        env:
          CI: true

      - name: Test
        run: |
          go run cmd/main.go run pipeline gha:unit:test --verbose

      - name: Upload inert JUnit test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: junit-report-${{ matrix.name }}
          path: .coverage/report-junit.xml
          if-no-files-found: warn
          retention-days: 7

  report:
    name: Publish test report
    if: always()
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    steps:
      - name: Download inert JUnit test report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          pattern: junit-report-*
          path: .coverage
          merge-multiple: true

      - name: Publish JUnit style test report
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        if: ${{ always() && hashFiles('.coverage/report-junit.xml') != '' }}
        with:
          report_paths: ".coverage/report-junit.xml"
          commit: ${{ github.sha }}
          fail_on_failure: true
          check_name: Eirctl Unit Tests
