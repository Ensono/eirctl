# OpenSSF Scorecard evaluates the repository's supply-chain security posture.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "17 8 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'branch_protection_rule'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Check out code without credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 14
