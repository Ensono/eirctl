# OpenSSF Scorecard evaluates the repository's supply-chain security posture.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "17 8 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'branch_protection_rule'
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Check out code without credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 14
